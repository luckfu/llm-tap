<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话数据管理</title>
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/dataTables.bootstrap5.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/github-markdown.min.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/marked.min.js') }}"></script>
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --border-radius: 12px;
            --box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
        }
        body {
            background-color: #f8f9fa;
            color: #2c3e50;
        }
        .container-fluid {
            max-width: 1400px;
            padding: 2rem;
        }
        .card {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
            transition: var(--transition);
            border: none;
            margin-bottom: 2rem;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }
        .table {
            background: white;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--box-shadow);
        }
        .table thead th {
            background-color: var(--secondary-color);
            border-bottom: none;
            padding: 1rem;
            font-weight: 600;
        }
        .table tbody tr {
            transition: var(--transition);
        }
        .table tbody tr:hover {
            background-color: var(--secondary-color);
        }
        .conversation-preview {
            max-height: 120px;
            overflow-y: auto;
            white-space: pre-wrap;
            padding: 0.5rem;
            background: var(--secondary-color);
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .modal-dialog {
            max-width: 90%;
            margin: 1.75rem auto;
        }
        .modal-content {
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow);
        }
        .modal-header {
            border-bottom: 1px solid rgba(0,0,0,0.1);
            background-color: var(--secondary-color);
        }
        .modal-body {
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
        }
        .modal-footer {
            border-top: 1px solid rgba(0,0,0,0.1);
            background-color: var(--secondary-color);
        }
        .btn {
            border-radius: 8px;
            padding: 0.5rem 1.5rem;
            font-weight: 500;
            transition: var(--transition);
        }
        .btn-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.3);
        }
        .form-select {
            border-radius: 8px;
            padding: 0.5rem 1rem;
            border: 1px solid rgba(0,0,0,0.1);
            transition: var(--transition);
        }
        .form-select:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(74, 144, 226, 0.25);
        }
        .message {
            margin-bottom: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            background-color: var(--secondary-color);
            animation: fadeIn 0.3s ease;
        }
        .message.human {
            background-color: #e3f2fd;
            margin-right: 15%;
        }
        .message.gpt {
            background-color: #f3f4f6;
            margin-left: 15%;
        }
        .message.function_call,
        .message.observation {
            background-color: #f8f9fa;
            font-family: monospace;
            font-size: 0.9em;
            margin: 0.5rem 5%;
        }
        .message-header {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }
        .message-content {
            font-size: 1rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow-x: auto;
        }
        .message-content .think {
            color: #666;
            font-style: italic;
            opacity: 0.8;
            font-size: 0.9em;
        }
            /* 自定义滚动条样式 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* 自定义滚动条样式 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body>
    <div class="container-fluid mt-4">
        <h2 class="mb-4">对话数据管理</h2>
        <div class="row mb-3">
            <div class="col-md-3">
                <select id="modelFilter" class="form-select">
                    <option value="">所有模型</option>
                </select>
            </div>
        </div>
        <div class="table-responsive">
            <table id="interactionsTable" class="table table-striped">
                <thead>
                    <tr>
                        <th><input type="checkbox" id="selectAll"></th>
                        <th>ID</th>
                        <th>模型</th>
                        <th>对话预览</th>
                        <th>时间戳</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        <div class="mt-3">
            <button id="batchConfirmBtn" class="btn btn-primary" disabled>批量确认</button>
            <button id="batchDeleteBtn" class="btn btn-danger ms-2" disabled>批量删除</button>
        </div>
    </div>

    <!-- 详情模态框 -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">对话详情</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="conversationDetail"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                    <button type="button" class="btn btn-danger" id="modalDeleteBtn">删除</button>
                    <button type="button" class="btn btn-primary" id="confirmBtn">确认</button>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/jquery-3.6.0.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/jquery.dataTables.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/dataTables.bootstrap5.min.js') }}"></script>
    <script>
        let currentId = null;
        let table;
        let uniqueModels = new Set();

        function formatJSON(obj) {
            return JSON.stringify(obj, null, 2).replace(/\n/g, '<br>').replace(/ /g, '&nbsp;');
        }

        $(document).ready(function() {
            // 初始化DataTable
            table = $('#interactionsTable').DataTable({
                ajax: {
                    url: '/get_interactions',
                    dataSrc: function(json) {
                        // 收集所有唯一的模型名称
                        json.data.forEach(item => uniqueModels.add(item.model));
                        updateModelFilter();
                        return json.data;
                    }
                },
                columns: [
                    {
                        data: null,
                        render: function() {
                            return '<input type="checkbox" class="record-checkbox">';
                        }
                    },
                    { 
                        data: 'id',
                        render: function(data) {
                            return data.substring(0, 8) + '...';  // 只显示前8位
                        }
                    },
                    { data: 'model' },
                    { 
                        data: 'conversation',
                        render: function(data) {
                            return '<div class="conversation-preview">' + data + '</div>';
                        }
                    },
                    { data: 'timestamp' },
                    {
                        data: null,
                        render: function(data) {
                            return '<button class="btn btn-sm btn-info view-btn me-2" data-id="' + data.id + '">查看</button>' +
                                   '<button class="btn btn-sm btn-danger delete-btn" data-id="' + data.id + '">删除</button>';
                        }
                    }
                ],
                order: [[4, 'desc']],
                language: {
                    url: 'https://cdn.datatables.net/plug-ins/1.11.5/i18n/zh.json'
                }
            });

            // 更新模型筛选器选项
            function updateModelFilter() {
                const $select = $('#modelFilter');
                const currentValue = $select.val();
                $select.empty().append('<option value="">所有模型</option>');
                Array.from(uniqueModels).sort().forEach(model => {
                    $select.append(`<option value="${model}">${model}</option>`);
                });
                $select.val(currentValue);
            }

            // 模型筛选事件
            $('#modelFilter').on('change', function() {
                const selectedModel = $(this).val();
                table.column(2).search(selectedModel).draw();
            });

            // 全选/取消全选
            $('#selectAll').on('change', function() {
                const isChecked = $(this).prop('checked');
                $('.record-checkbox').prop('checked', isChecked);
                updateBatchConfirmButton();
            });

            // 单个复选框变化事件
            $('#interactionsTable').on('change', '.record-checkbox', function() {
                updateBatchConfirmButton();
            });

            // 更新批量确认按钮状态
            function updateBatchConfirmButton() {
                const checkedCount = $('.record-checkbox:checked').length;
                $('#batchConfirmBtn').prop('disabled', checkedCount === 0);
                $('#batchDeleteBtn').prop('disabled', checkedCount === 0);
            }

            // 批量确认按钮点击事件
            $('#batchConfirmBtn').click(function() {
                const selectedIds = [];
                $('.record-checkbox:checked').each(function() {
                    const rowData = table.row($(this).closest('tr')).data();
                    selectedIds.push(rowData.id);
                });

                if (selectedIds.length === 0) return;

                const confirmBatch = async () => {
                    for (const id of selectedIds) {
                        try {
                            await $.ajax({
                                url: '/confirm',
                                method: 'POST',
                                contentType: 'application/json',
                                data: JSON.stringify({ id: id })
                            });
                        } catch (error) {
                            console.error(`确认ID ${id} 失败:`, error);
                        }
                    }
                    table.ajax.reload();
                    $('#selectAll').prop('checked', false);
                    updateBatchConfirmButton();
                };

                confirmBatch();
            });

            // 批量删除按钮点击事件
            $('#batchDeleteBtn').click(function() {
                const selectedIds = [];
                $('.record-checkbox:checked').each(function() {
                    const rowData = table.row($(this).closest('tr')).data();
                    selectedIds.push(rowData.id);
                });

                if (selectedIds.length === 0) return;

                if (confirm(`确定要删除选中的 ${selectedIds.length} 条记录吗？`)) {
                    const deleteBatch = async () => {
                        for (const id of selectedIds) {
                            try {
                                await $.ajax({
                                    url: '/delete',
                                    method: 'POST',
                                    contentType: 'application/json',
                                    data: JSON.stringify({ id: id })
                                });
                            } catch (error) {
                                console.error(`删除ID ${id} 失败:`, error);
                            }
                        }
                        table.ajax.reload();
                        $('#selectAll').prop('checked', false);
                        updateBatchConfirmButton();
                    };

                    deleteBatch();
                }
            });

            // 表格中删除按钮点击事件
            $('#interactionsTable').on('click', '.delete-btn', function() {
                const data = table.row($(this).closest('tr')).data();
                if (confirm('确定要删除这条记录吗？')) {
                    $.ajax({
                        url: '/delete',
                        method: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ id: data.id }),
                        success: function(response) {
                            if (response.success) {
                                table.ajax.reload();
                            } else {
                                alert('删除失败：' + (response.error || '未知错误'));
                            }
                        },
                        error: function(xhr) {
                            let errorMessage = '删除失败';
                            if (xhr.responseJSON && xhr.responseJSON.error) {
                                errorMessage += '：' + xhr.responseJSON.error;
                            }
                            alert(errorMessage);
                        }
                    });
                }
            });

            // 工具信息展开/折叠功能
            $('#conversationDetail').on('click', '.toggle-tools', function() {
                $(this).closest('.message').find('.tools-content').slideToggle();
            });

            // 查看按钮点击事件
            $('#interactionsTable').on('click', '.view-btn', function() {
                const data = table.row($(this).closest('tr')).data();
                currentId = data.id;
                
                // 格式化对话内容
                let conversationHtml = '<div class="conversation-container markdown-body">';
                console.log('点击查看按钮，获取到的行数据:', data);
                console.log('当前记录ID:', currentId);

                // 先处理system字段
                if (data.full_conversation && data.full_conversation.system) {
                    console.log('处理system字段:', data.full_conversation.system);
                    let systemContent = marked.parse(data.full_conversation.system);
                    systemContent = systemContent.replace(/<think>(.*?)<\/think>/g, '<span class="think">$1</span>');
                    conversationHtml += `
                        <div class="message system">
                            <div class="message-header">系统</div>
                            <div class="message-content">${systemContent}</div>
                        </div>
                    `;
                }

                // 处理tools字段
                if (data.full_conversation && data.full_conversation.tools) {
                    console.log('处理tools字段:', data.full_conversation.tools);
                    let toolsContent = JSON.stringify(data.full_conversation.tools, null, 2);
                    toolsContent = marked.parse('```json\n' + toolsContent + '\n```');
                    const toolCount = data.full_conversation.tools.length;
                    conversationHtml += `
                        <div class="message tools">
                            <div class="message-header d-flex justify-content-between align-items-center">
                                <span>可用工具 (${toolCount})</span>
                                <button class="btn btn-sm btn-outline-primary toggle-tools">展开/折叠</button>
                            </div>
                            <div class="message-content tools-content" style="display: none;">${toolsContent}</div>
                        </div>
                    `;
                }

                // 再处理conversations数组
                if (data.full_conversation && data.full_conversation.conversations) {
                    console.log('开始处理对话数据，对话数组长度:', data.full_conversation.conversations.length);
                    data.full_conversation.conversations.forEach((msg, index) => {
                        console.log(`处理第${index + 1}条消息:`, msg);
                        const role = msg.from.toLowerCase();
                        let content = msg.value;
                        
                        // 对于function_call类型，尝试解析并格式化JSON
                        if (role === 'function_call') {
                            try {
                                const jsonObj = JSON.parse(content);
                                content = JSON.stringify(jsonObj, null, 2);
                                content = marked.parse('```json\n' + content + '\n```');
                            } catch (e) {
                                console.error('JSON解析失败:', e);
                                content = marked.parse(content);
                            }
                        } else {
                            // 其他类型消息正常应用Markdown转换
                            content = marked.parse(content);
                        }
                        console.log(`第${index + 1}条消息转换后:`, content);
                        // 然后处理<think>标签，替换为<i>标签
                        content = content.replace(/<think>([\s\S]*?)<\/think>/g, '<span class="think">$1</span>');
                        
                        let roleText = '';
                        let messageClass = role;
                        
                        switch(role) {
                            case 'human':
                                roleText = '用户';
                                messageClass = 'human';
                                break;
                            case 'assistant':
                            case 'gpt':
                                roleText = 'AI';
                                messageClass = 'gpt';
                                break;
                            case 'system':
                                roleText = '系统';
                                messageClass = 'system';
                                break;
                            case 'function_call':
                                roleText = '函数调用';
                                break;
                            case 'observation':
                                roleText = '函数返回';
                                break;
                            default:
                                roleText = role;
                        }
                        
                        conversationHtml += `
                            <div class="message ${messageClass}">
                                <div class="message-header">${roleText}</div>
                                <div class="message-content">${content}</div>
                            </div>
                        `;
                    });
                }
                conversationHtml += '</div>';

                $('#conversationDetail').html(conversationHtml);
                new bootstrap.Modal($('#detailModal')).show();
            });

            // 模态框删除按钮点击事件
            $('#modalDeleteBtn').click(function() {
                if (!currentId) return;
                
                if (confirm('确定要删除这条记录吗？')) {
                    $.ajax({
                        url: '/delete',
                        method: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify({ id: currentId }),
                        success: function(response) {
                            if (response.success) {
                                $('#detailModal').modal('hide');
                                table.ajax.reload();
                            } else {
                                alert('删除失败：' + (response.error || '未知错误'));
                            }
                        },
                        error: function(xhr) {
                            let errorMessage = '删除失败';
                            if (xhr.responseJSON && xhr.responseJSON.error) {
                                errorMessage += '：' + xhr.responseJSON.error;
                            }
                            alert(errorMessage);
                        }
                    });
                }
            });

            // 确认按钮点击事件
            $('#confirmBtn').click(function() {
                if (!currentId) return;
                
                $.ajax({
                    url: '/confirm',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ id: currentId }),
                    success: function(response) {
                        if (response.success) {
                            $('#detailModal').modal('hide');
                            table.ajax.reload();
                        } else {
                            alert('操作失败：' + (response.error || '未知错误'));
                        }
                    },
                    error: function(xhr) {
                        let errorMessage = '操作失败';
                        if (xhr.responseJSON && xhr.responseJSON.error) {
                            errorMessage += '：' + xhr.responseJSON.error;
                        }
                        alert(errorMessage);
                    }
                });
            });
        });
    </script>
</body>
</html>
